spring:
  datasource:
    url: jdbc:postgresql://postgresql:5432/postgres
    username: ${POSTGRESQL_USER}
    password: ${POSTGRESQL_PASS}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 587
    username: ${MAILTRAP_USER}
    password: ${MAILTRAP_PASSWORD}

jwt:
  secret: ${JWT_SECRET}