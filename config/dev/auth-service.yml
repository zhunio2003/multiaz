spring:
  datasource:
    url: jdbc:postgresql://postgresql:5432/postgres
    username: ${POSTGRESQL_USER}
    password: ${POSTGRESQL_PASS}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASS}
  jpa:
    properties:
      hibernate:
        default_schema: auth
  mail:
    host: mailhog
    port: 1025

jwt:
  secret: ${JWT_SECRET}

# loggging TRACER
logging:
  level:
    '[org.springframework.security]': TRACE 
