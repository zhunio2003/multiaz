name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven  
      
      - name: Run tests on auth service
        run: mvn test -f backend/core/auth-service/pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build config-service
        run: docker build -t config-service ./backend/infrastructure/config-service

      - name: Build service-discovery
        run: docker build -t service-discovery ./backend/infrastructure/service-discovery