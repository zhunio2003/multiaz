spring:
  application:
    name: api-gateway
  config: 
    import: optional:configserver:http://config-service:8888
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-register
              uri: lb://auth-service
              predicates:
                - Path=/auth/register
            - id: auth-login
              uri: lb://auth-service
              predicates:
                - Path=/auth/login
            - id: auth-recovery
              uri: lb://auth-service
              predicates:
                - Path=/auth/recovery
            - id: auth-protected
              uri: lb://auth-service
              predicates:
                - Path=/auth/**


eureka: 
  client: 
    serviceUrl:
      defaultZone: http://service-discovery:8761/eureka/

server: 
  port: 8080


