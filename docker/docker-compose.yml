version: '3.8'

services:

  config-service: 
    build:
       context: ../backend/infrastructure/config-service/
       dockerfile: Dockerfile
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
    networks:
      - net-gateway
    volumes:
      - ../config:/config
    
  service-discovery:
    build: 
      context: ../backend/infrastructure/service-discovery/
      dockerfile: Dockerfile
    container_name: service-discovery
    ports:
      - "8761:8761"
    networks:
      - net-gateway
      - net-prediction
  
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    volumes:
      - vol-rabbitmq:/var/lib/rabbitmq
    networks:
      - net-message

volumes:
  vol-rabbitmq:
    driver: local

networks:
  net-gateway:
    driver: bridge
  net-prediction:
    driver: bridge
  net-message:
    driver: bridge

