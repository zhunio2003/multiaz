services:

  config-service: 
    build:
       context: ../backend/infrastructure/config-service/
       dockerfile: Dockerfile
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
    networks:
      - net-gateway
    volumes:
      - ../config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    
  service-discovery:
    build: 
      context: ../backend/infrastructure/service-discovery/
      dockerfile: Dockerfile
    container_name: service-discovery
    ports:
      - "8761:8761"
    networks:
      - net-gateway
      - net-prediction
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  

  # CORES
  api-gateway:
    build: 
      context: ../backend/core/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - net-gateway
    depends_on:
      - config-service
      - service-discovery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    
  auth-service:
    build:
      context: ../backend/core/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASS=${POSTGRESQL_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - net-gateway
      - net-database
    depends_on:
      config-service:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # MESSAGES
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    volumes:
      - vol-rabbitmq:/var/lib/rabbitmq
    networks:
      - net-message
  
  # STORAGE
  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASS}"]
    volumes:
      - vol-redis:/data
    networks:
      - net-database

  postgresql:
    image: postgres:17
    container_name: postgresql
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRESQL_USER}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASS}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - vol-postgresql:/var/lib/postgresql/data
      - ../backend/core/auth-service/src/main/resources/migration/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - net-database
  
  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASS}
    volumes:
      - vol-mongodb:/data/db
    networks:
      - net-database
  
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASS}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - vol-minio:/data
    networks:
      - net-database
    

volumes:
  vol-rabbitmq:
    driver: local
  vol-redis:
    driver: local
  vol-postgresql:
    driver: local
  vol-mongodb:
    driver: local
  vol-minio:
    driver: local

networks:
  net-gateway:
    driver: bridge
  net-prediction:
    driver: bridge
  net-message:
    driver: bridge
  net-database:
    driver: bridge
